# RunForge · 生产环境覆盖配置
# 使用方式：docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    image: runforge-backend:${APP_VERSION:-latest}
    build:
      target: runtime
    # 生产环境去掉热重载挂载
    volumes: []
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    environment:
      DEBUG: "false"
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
