# RunForge · docker-compose.yml
# 开发环境（默认）
# 启动：docker compose up
# 后台：docker compose up -d
# 停止：docker compose down

services:

  # ── FastAPI 后端 ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    image: runforge-backend:dev
    container_name: runforge-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      # 热重载：本地代码变更立即生效，无需重建镜像
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

